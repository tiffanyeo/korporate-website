<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korporate</title>
</head>

<body>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            /* bakgrund runt mobilen */
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        main {
            /* iPhone Pro Max */
            max-width: 430px;
            min-height: 932px;
            /* iPhone Pro Max */
            margin: 30px auto;
            background-color: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

    </style>


    <main>

        <style>
            .header-comp {
                height: 100px;
                background-color: lightblue;
                display: flex;
                flex-direction: row;
            }

            .logo {
                display: flex;
                align-items: center;
                margin: 20px;
                border: 2px solid #0B0D3C;
                border-radius: 5px;
                padding: 20px 10px
            }

            .logo-text-k {
                font-size: xx-large;
                margin-right: -3px;
            }

            .logo-text {
                color: #0B0D3C;
            }
        </style>

        <div class="header-comp">
            <div class="logo">
                <p class="logo-text logo-text-k">K</p>
                <p class="logo-text logo-text-orporate">orporate</p>
            </div>
        </div>
        
        

    </main>

    
    <script type="module" src="style.css"></script>
    
</body>

</html>
